name: Keep Render app awake

# Trip Ledger runs on Render's free tier, which spins the service down after
# ~15 minutes of no traffic. The next real visit then has to wait through a
# slow cold start. This workflow just pings the homepage often enough during
# Japan daytime/evening hours to keep it warm for the September trip.
#
# Schedule: every 10 minutes, UTC hours 23 and 0-14, which is JST 08:00-23:59
# (UTC 23:00 = JST 08:00 next day; UTC 14:50 = JST 23:50).
# GitHub Actions cron times are best-effort and can slip a few minutes under load.
#
# To stop this: delete this file, or go to the repo's Actions tab and disable
# the "Keep Render app awake" workflow.

on:
  schedule:
    - cron: '*/10 23,0-14 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping homepage to prevent Render free-tier sleep
        run: curl -s -o /dev/null -m 60 https://trip-ledger.onrender.com/
